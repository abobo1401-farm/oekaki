<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>お絵描き操作画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <strong>✏️ お絵描き操作画面</strong><br>
          <small>スマホで描いた線がOBSへ反映されます</small>
        </div>
        <span id="status" class="status ng">未接続</span>
      </div>

      <div class="row" style="margin:14px 0 10px">
        <label for="room">部屋ID</label>
        <input id="room" type="text" value="abo-room" maxlength="30" autocomplete="off">
        <button id="connectBtn">接続</button>
      </div>

      <div class="canvas-shell">
        <canvas id="canvas" width="1280" height="720"></canvas>
      </div>

      <div class="toolbar">
        <div class="tool-block">
          <label>ペン色</label>
          <div class="colors" id="colors">
            <button class="color-btn active" data-color="#111111" style="background:#111111" aria-label="黒"></button>
            <button class="color-btn" data-color="#e53935" style="background:#e53935" aria-label="赤"></button>
            <button class="color-btn" data-color="#1e88e5" style="background:#1e88e5" aria-label="青"></button>
            <button class="color-btn" data-color="#43a047" style="background:#43a047" aria-label="緑"></button>
            <button class="color-btn" data-color="#f9a825" style="background:#f9a825" aria-label="黄"></button>
            <button class="color-btn" data-color="#8e24aa" style="background:#8e24aa" aria-label="紫"></button>
          </div>
        </div>

        <div class="tool-block">
          <label for="size">線の太さ：<span id="sizeValue">8</span></label>
          <div class="range-wrap">
            <input id="size" type="range" min="2" max="40" value="8">
          </div>
        </div>

        <div class="tool-block row">
          <button id="eraserBtn" class="secondary">消しゴム</button>
          <button id="clearBtn" class="danger">全消し</button>
        </div>
      </div>

      <p class="hint">
        OBSには <code>obs.html?room=部屋ID</code> をブラウザソースとして登録してください。
        操作画面とOBS画面で同じ部屋IDを使います。
      </p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
  (() => {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const roomInput = document.getElementById('room');
    const statusEl = document.getElementById('status');
    const sizeInput = document.getElementById('size');
    const sizeValue = document.getElementById('sizeValue');
    const eraserBtn = document.getElementById('eraserBtn');

    let db, strokesRef, clearRef;
    let connected = false;
    let drawing = false;
    let last = null;
    let color = '#111111';
    let size = 8;
    let eraser = false;
    let roomId = '';

    function setStatus(text, ok=false) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + (ok ? 'ok' : 'ng');
    }

    function initFirebase() {
      if (!window.FIREBASE_CONFIG || String(window.FIREBASE_CONFIG.apiKey).includes('YOUR_')) {
        setStatus('Firebase設定が必要');
        return false;
      }
      if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
      db = firebase.database();
      return true;
    }

    function sanitizeRoom(value) {
      return value.trim().replace(/[.#$\[\]\/]/g, '-').slice(0, 30) || 'abo-room';
    }

    function clearCanvasOnly() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawStroke(s) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = s.eraser ? '#ffffff' : s.color;
      ctx.lineWidth = s.size;
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      ctx.restore();
    }

    function connect() {
      if (!initFirebase()) return;
      if (strokesRef) strokesRef.off();
      if (clearRef) clearRef.off();

      roomId = sanitizeRoom(roomInput.value);
      roomInput.value = roomId;
      history.replaceState(null, '', '?room=' + encodeURIComponent(roomId));

      strokesRef = db.ref('drawingRooms/' + roomId + '/strokes');
      clearRef = db.ref('drawingRooms/' + roomId + '/clearAt');

      clearCanvasOnly();
      strokesRef.off();
      clearRef.off();

      strokesRef.on('child_added', snap => {
        const s = snap.val();
        if (s) drawStroke(s);
      });

      clearRef.on('value', snap => {
        if (snap.exists()) clearCanvasOnly();
      });

      connected = true;
      setStatus('接続中：' + roomId, true);
    }

    function pointerPos(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - r.left) * canvas.width / r.width,
        y: (e.clientY - r.top) * canvas.height / r.height
      };
    }

    canvas.addEventListener('pointerdown', e => {
      if (!connected) return;
      drawing = true;
      canvas.setPointerCapture(e.pointerId);
      last = pointerPos(e);
    });

    canvas.addEventListener('pointermove', e => {
      if (!drawing || !connected) return;
      const p = pointerPos(e);
      const stroke = {
        x1: last.x, y1: last.y, x2: p.x, y2: p.y,
        color, size, eraser, t: firebase.database.ServerValue.TIMESTAMP
      };
      drawStroke(stroke);
      strokesRef.push(stroke);
      last = p;
    });

    function endDraw() { drawing = false; last = null; }
    canvas.addEventListener('pointerup', endDraw);
    canvas.addEventListener('pointercancel', endDraw);

    document.getElementById('colors').addEventListener('click', e => {
      const btn = e.target.closest('[data-color]');
      if (!btn) return;
      color = btn.dataset.color;
      eraser = false;
      eraserBtn.classList.add('secondary');
      document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', b === btn));
    });

    sizeInput.addEventListener('input', () => {
      size = Number(sizeInput.value);
      sizeValue.textContent = size;
    });

    eraserBtn.addEventListener('click', () => {
      eraser = !eraser;
      eraserBtn.classList.toggle('secondary', !eraser);
      eraserBtn.textContent = eraser ? '消しゴム ON' : '消しゴム';
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
      if (!connected) return;
      if (!confirm('キャンバスを全部消しますか？')) return;
      await strokesRef.remove();
      await clearRef.set(firebase.database.ServerValue.TIMESTAMP);
      clearCanvasOnly();
    });

    document.getElementById('connectBtn').addEventListener('click', connect);

    const params = new URLSearchParams(location.search);
    if (params.get('room')) roomInput.value = params.get('room');
    clearCanvasOnly();
    connect();
  })();
  </script>
</body>
</html>
