<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>お絵描き OBS表示</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:transparent; }
    body { display:grid; place-items:center; }
    canvas { width:100vw; height:100vh; display:block; background:#fff; }
    #msg {
      position:fixed; top:12px; left:12px; padding:8px 12px; border-radius:10px;
      background:rgba(0,0,0,.62); color:white; font:14px system-ui; z-index:3;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="720"></canvas>
  <div id="msg">接続中...</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
  (() => {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');
    const params = new URLSearchParams(location.search);
    const roomId = (params.get('room') || 'abo-room').replace(/[.#$\[\]\/]/g, '-').slice(0,30);

    function clearCanvas() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    function drawStroke(s) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = s.eraser ? '#ffffff' : s.color;
      ctx.lineWidth = s.size;
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      ctx.restore();
    }

    clearCanvas();

    if (!window.FIREBASE_CONFIG || String(window.FIREBASE_CONFIG.apiKey).includes('YOUR_')) {
      msg.textContent = 'firebase-config.js を設定してください';
      return;
    }

    if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
    const db = firebase.database();
    const base = db.ref('drawingRooms/' + roomId);

    base.child('strokes').on('child_added', snap => {
      const s = snap.val();
      if (s) drawStroke(s);
    });

    base.child('clearAt').on('value', snap => {
      if (snap.exists()) clearCanvas();
    });

    db.ref('.info/connected').on('value', snap => {
      msg.textContent = snap.val() ? '接続中：' + roomId : '再接続中...';
      if (snap.val()) setTimeout(() => msg.style.display = 'none', 1400);
      else msg.style.display = 'block';
    });
  })();
  </script>
</body>
</html>
